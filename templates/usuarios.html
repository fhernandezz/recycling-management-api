<!DOCTYPE html>
<html lang="es">

<head>

    <meta charset="UTF-8">

    <title>Recicladores</title>

    <link rel="stylesheet" href="/static/css/estilos.css">

</head>

<body>

<header>

    <h1>♻ Gestión de Recicladores ♻</h1>

    <nav>

        <a href="usuarios.html">Recicladores</a>

        <a href="centros.html">Centros</a>

        <a href="entregas.html">Entregas</a>

        <a href="reportes.html">Reportes</a>

        <a href="login.html">Salir</a>

    </nav>

</header>

<main>

<section class="buscador">

    <h2>Buscar Reciclador</h2>

    <input
        type="text"
        id="buscarID"
        placeholder="Ingrese el ID del reciclador">

    <div class="acciones-busqueda">

        <button type="button" onclick="buscarReciclador()">
            Buscar
        </button>

        <button type="button" onclick="cargarRecicladores()">
            Ver todos
        </button>

    </div>

</section>

<hr>

<form id="formRecycler">

    <h2>Registrar / Editar Reciclador</h2>

    <label>ID</label>
    <input type="text" id="recycler_id" required>

    <label>Nombre Completo</label>
    <input type="text" id="full_name" required>

    <label>Cédula</label>
    <input type="text" id="id_number" required>

    <label>Correo</label>
    <input type="email" id="email" required>

    <label>Teléfono</label>
    <input type="text" id="phone" required>

    <label>Distrito</label>
    <input type="text" id="district" required>

    <label>Fecha Registro</label>
    <input type="date" id="registration_date" required>

    <button type="submit">

        Guardar

    </button>

</form>

<hr>

<h2>Lista de Recicladores</h2>

<table>

<thead>

<tr>

<th>ID</th>

<th>Nombre</th>

<th>Cédula</th>

<th>Correo</th>

<th>Teléfono</th>

<th>Distrito</th>

<th>Activo</th>

<th>Acciones</th>

</tr>

</thead>

<tbody id="tablaRecicladores">

</tbody>

</table>

</main>

<footer>

Proyecto Desarrollo de Software III

</footer>

<script src="/static/js/usuarios.js"></script>

</body>

</html>
