<!DOCTYPE html>
<html lang="es">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Iniciar Sesión</title>

    <link rel="stylesheet" href="/static/css/estilos.css">

</head>

<body>

<header>

    <h1>♻ Sistema de Gestión Comunitaria de Reciclaje</h1>

</header>

<main>

    <form id="loginForm">

        <h2>Iniciar Sesión</h2>

        <label for="recycler_id">
            ID del Reciclador
        </label>

        <input
                type="text"
                id="recycler_id"
                placeholder="Ingrese su ID"
                required>

        <label for="password">
            Contraseña
        </label>

        <input
                type="password"
                id="password"
                placeholder="Ingrese su contraseña"
                required>

        <button type="submit">

            Ingresar

        </button>

    </form>

</main>

<footer>

    Universidad de Costa Rica

</footer>

<script src="/static/js/login.js"></script>

</body>

</html>
